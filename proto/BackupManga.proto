syntax = "proto3";

import "BackupChapter.proto";
import "BackupHistory.proto";
import "BackupTracking.proto";

message BackupManga {
    int64 source = 1;
    string url = 2;
    string title = 3;
    optional string artist = 4;
    optional string author = 5;
    optional string description = 6;
    repeated string genre = 7;
    int32 status = 8;
    optional string thumbnailUrl = 9;
    int64 dateAdded = 13;
    int32 viewer = 14;
    repeated BackupChapter chapters = 16;
    repeated int64 categories = 17;
    repeated BackupTracking tracking = 18;
    bool favorite = 100;
    int32 chapterFlags = 101;
    optional int32 viewer_flags = 103;
    repeated BackupHistory history = 104;
    int32 updateStrategy = 105;
    int64 lastModifiedAt = 106;
    optional int64 favoriteModifiedAt = 107;
    repeated string excludedScanlators = 108;
    int64 version = 109;
    string notes = 110;
    bool initialized = 111;

    // J2K/Chimahon custom manga info represented by Mangatan.
    optional string customTitle = 800;

    // Chimahon also defines SY metadata at 600-603 and custom artist,
    // author, description, and genre at 801, 802, 804, and 805. Mangatan has
    // no lossless local model for those values, so they intentionally remain
    // protobuf unknown fields. The sync merger carries their original wire
    // values forward. Do not make them known here without also adding explicit
    // import/export and winner-preservation rules.
}
